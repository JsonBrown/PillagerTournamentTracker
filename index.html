<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pillager Tournament Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;}());</script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="site-title">
        <img id="site-logo" src="" alt="" hidden />
        <h1>Pillager Tournament Tracker</h1>
      </div>
      <div class="header-controls">
        <select id="team-filter" onchange="filterByTeam(this.value)" disabled>
          <option value="">All Teams</option>
        </select>
        <div class="status-bar">
          <span id="status-dot" class="dot dot-idle"></span>
          <span id="status-text">Loading…</span>
          <button id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode"></button>
          <button id="refresh-btn" onclick="manualRefresh()">&#8635; Refresh</button>
        </div>
      </div>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn tab-active" data-tab="schedule" onclick="showTab('schedule')">Schedule</button>
    <button class="tab-btn" data-tab="standings" onclick="showTab('standings')">Team Stats</button>
  </nav>

  <main>
    <div id="tournament-content">
      <p class="loading">Loading tournament data…</p>
    </div>
    <div id="standings-content" hidden></div>
  </main>

  <div id="sets-popup" class="sets-popup hidden" role="tooltip">
    <button id="sets-popup-close" class="sets-popup-close" aria-label="Close">&#x2715;</button>
    <div class="sets-popup-body"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
